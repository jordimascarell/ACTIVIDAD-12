<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --width-columna: 10vw;
            --margen: 1vw;
            --font-size: 3.5vw;
        }

        body {
            background-color: black;
            overflow-x: hidden;
        }

        .inter-headers {
            font-family: "Inter", sans-serif;
            font-optical-sizing: auto;
            font-weight: 900;
            font-style: normal;
            font-size: var(--font-size);
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }

        a {
            text-decoration: none;
            color: inherit;
            display: flex;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: flex;
            flex-direction: row;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .columna {
            position: relative;
            flex: 1;
            height: 100%;
        }

        .columna-negra { background-color: black; }
        .columna-roja { background-color: red; }

        .columna-negra > div { background-color: red; }
        .columna-roja > div { background-color: black; }

        .columna-negra .inter-headers { color: black; }
        .columna-roja .inter-headers { color: red; }

        .columna-arriba {
            position: absolute;
            top: var(--margen);
            left: var(--margen);
            right: var(--margen);
            height: calc(var(--width-columna) - (var(--margen) * 2));
            border-radius: 50%;
        }

        .columna-abajo {
            position: absolute;
            bottom: var(--margen);
            left: var(--margen);
            right: var(--margen);
            height: calc(var(--width-columna) - (var(--margen) * 2));
            border-radius: 50%;
        }

        .círculo {
            position: absolute;
            top: calc(var(--width-columna) + var(--margen));
            bottom: calc(var(--width-columna) + var(--margen));
            left: var(--margen);
            right: var(--margen);
            border-radius: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .col{
            display: flex;
            flex-direction: column;
            padding: 90% 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
